<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wieland Healthcare — Order Confirmation</title>
  <style>
    body { margin:0; padding:0; font-family:"Segoe UI", Arial, sans-serif;
      background:#f5f5f5; display:flex; justify-content:center; align-items:center;
      min-height:100vh; }
    .card { background:#fff; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,0.10);
      max-width:480px; width:90%; text-align:center; overflow:hidden; }
    .card-header { padding:32px 24px 16px; }
    .icon { font-size:48px; }
    .card-header h1 { margin:12px 0 0; font-size:22px; color:#212121; }
    .card-body { padding:24px; color:#555; font-size:24px; line-height:1.6; }
    .card-footer { padding:16px 24px 24px; }
    .btn { display:inline-block; padding:12px 32px; color:#fff; border:none;
      border-radius:6px; font-size:16px; cursor:pointer; text-decoration:none; }
    .btn:hover { opacity:0.85; }
    .success .btn { background:#2e7d32; }
    .info .btn    { background:#1565c0; }
    .fail .btn    { background:#c62828; }
    .btn:disabled { opacity:0.5; cursor:default; }
    .footer-note { color:#888; font-size:14px; margin:8px 0 0; display:none; }
    .logo { max-width:160px; margin-bottom:12px; }
    .ready .card-header   { background:#e3f2fd; } .ready .icon   { color:#1565c0; } .ready .btn   { background:#1565c0; }
    .loading .card-header { background:#e3f2fd; } .loading .icon { color:#1565c0; }
    .success .card-header { background:#e8f5e9; } .success .icon { color:#2e7d32; }
    .info .card-header    { background:#e3f2fd; } .info .icon    { color:#1565c0; }
    .fail .card-header    { background:#fce4ec; } .fail .icon    { color:#c62828; }
    .spinner { display:inline-block; width:48px; height:48px;
      border:4px solid #ccc; border-top:4px solid #1565c0;
      border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card ready" id="card">
    <div class="card-header">
      <!-- H7: commit logo.png to this repo (same folder as this file) instead of
           hotlinking the WordPress theme path, which breaks when the site theme updates. -->
      <img class="logo" src="https://wielandhealthcare.com/wp-content/themes/_tk-1.1/images/wieland-healthcare-logo.png" alt="Wieland Healthcare Logo">
      <div class="icon" id="icon">&#128203;</div>
      <h1 id="title">Confirm Your Order</h1>
    </div>
    <div class="card-body">
      <p id="message">Please click the button below to confirm your order with Wieland Healthcare.</p>
    </div>
    <div class="card-footer">
      <button class="btn" id="actionBtn" onclick="confirmOrder()">Confirm Order</button>
      <button class="btn" id="closeBtn" style="display:none;" onclick="tryClose()">Close This Tab</button>
      <p class="footer-note" id="footerNote" style="display:none;">You may now close this tab.</p>
    </div>
  </div>

  <script>
    // UPDATE THIS to your latest Apps Script deployment URL.
    // (Redeploy via Manage deployments > Edit > New version so this URL never changes.)
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbjmtwGt667uFj7eTLeJ-UJTpB9YVPHmj4TO-KnQncjIKdWh3_SWQsTX1DDMJ6hf6LtA/exec";
    var TIMEOUT_MS = 15000;          // H2: give up waiting after 15 seconds

    // H4: extract only the token; do not forward arbitrary query params.
    var params = new URLSearchParams(window.location.search);
    var token = params.get("t");

    var responded = false;           // H8: ignore late/duplicate JSONP callbacks
    var timer = null;

    // H3: no token -> explain instead of showing a confirm button that can't work.
    if (!token) {
      setState("fail", "\u2718", "Link Problem",
        "This confirmation link is incomplete. Please try clicking the link in your " +
        "email again, or contact us and we'll be happy to help.", false);
    }

    // H1: the Apps Script call only happens on an explicit human click,
    // so email-security bots that pre-visit the link cannot consume the token.
    function confirmOrder() {
      document.getElementById("actionBtn").disabled = true;
      setState("loading", '<div class="spinner"></div>', "Processing...",
        "Please wait while we confirm your order.", false);

      var script = document.createElement("script");
      script.src = APPS_SCRIPT_URL + "?t=" + encodeURIComponent(token);
      script.onerror = function () {
        finish(false, "Error",
          "We couldn't reach the confirmation service. Please try clicking the link " +
          "in your email again in a few minutes, or reply to your confirmation email " +
          "and we'll process it manually.");
      };
      document.body.appendChild(script);

      timer = setTimeout(function () {
        finish(false, "Taking Too Long",
          "The confirmation service didn't respond. Please try clicking the link " +
          "in your email again in a few minutes, or reply to your confirmation email " +
          "and we'll process it manually.");
      }, TIMEOUT_MS);
    }

    // JSONP callback — Apps Script wraps its reply as handleResponse({success, title, message})
    function handleResponse(data) {
      finish(data.success, data.title, data.message);
    }

    // Renders a message allowing ONLY <strong> for bolding.
    // Everything is inserted as text nodes, so no other HTML can execute.
    function setMessage(el, message) {
      el.textContent = "";
      var parts = String(message).split(/<\/?strong\s*>/i);
      for (var i = 0; i < parts.length; i++) {
        if (i % 2 === 1) {
          var b = document.createElement("strong");
          b.textContent = parts[i];
          el.appendChild(b);
        } else {
          el.appendChild(document.createTextNode(parts[i]));
        }
      }
    }
    function finish(success, title, message) {
      if (responded) return;         // H8
      responded = true;
      if (timer) clearTimeout(timer);
      var isInfo = (!success && title === "Already Confirmed");
      setState(success ? "success" : (isInfo ? "info" : "fail"),
        success ? "\u2714" : (isInfo ? "\u2139" : "\u2718"),
        title, message, true);
    }

    function tryClose() {
      window.close();
      // If the browser refused (tab wasn't script-closable), fall back to the note
      setTimeout(function () {
        document.getElementById("closeBtn").style.display = "none";
        document.getElementById("footerNote").style.display = "block";
      }, 300);
    }

    function setState(cls, iconHtml, title, message, showClose) {
      var card = document.getElementById("card");
      card.className = "card " + cls;
      document.getElementById("icon").innerHTML = iconHtml;
      document.getElementById("title").textContent = title;
      document.getElementById("message").textContent = message;
      document.title = title + " — Wieland Healthcare";
      document.getElementById("actionBtn").style.display = (cls === "ready") ? "inline-block" : "none";
      document.getElementById("closeBtn").style.display = showClose ? "inline-block" : "none";
      document.getElementById("footerNote").style.display = "none";
    }
  </script>
</body>
</html>
