<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Wieland Healthcare</title>
  <style>
    body { margin:0; padding:0; font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f5f5; display:flex; justify-content:center; align-items:center;
      min-height:100vh; }
    .card { background:#fff; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,0.10);
      max-width:480px; width:90%; text-align:center; overflow:hidden; }
    .card-header { padding:32px 24px 16px; }
    .icon { font-size:48px; }
    .card-header h1 { margin:12px 0 0; font-size:22px; color:#212121; }
    .card-body { padding:24px; color:#555; font-size:16px; line-height:1.6; }
    .card-footer { padding:16px 24px 24px; }
    .btn-close { display:inline-block; padding:10px 28px;
      color:#fff; border:none; border-radius:6px; font-size:14px; cursor:pointer;
      text-decoration:none; }
    .btn-close:hover { opacity:0.85; }
    .logo { max-width:160px; margin-bottom:12px; }
    .success .card-header { background:#e8f5e9; }
    .success .icon { color:#2e7d32; }
    .success .btn-close { background:#2e7d32; }
    .fail .card-header { background:#fce4ec; }
    .fail .icon { color:#c62828; }
    .fail .btn-close { background:#c62828; }
    .info .card-header { background:#e3f2fd; }
    .info .icon { color:#1565c0; }
    .info .btn-close { background:#1565c0; }
    .loading .card-header { background:#e3f2fd; }
    .loading .icon { color:#1565c0; }
    .loading .btn-close { background:#1565c0; }
    .spinner { display:inline-block; width:48px; height:48px;
      border:4px solid #ccc; border-top:4px solid #1565c0;
      border-radius:50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card loading" id="card">
    <div class="card-header">
      <img class="logo" src="https://wielandhealthcare.com/wp-content/themes/_tk-1.1/images/wieland-healthcare-logo.png" alt="Wieland Healthcare Logo">
      <div class="icon" id="icon"><div class="spinner"></div></div>
      <h1 id="title">Processing...</h1>
    </div>
    <div class="card-body"><p id="message">Please wait while we confirm your response.</p></div>
    <div class="card-footer">
      <button class="btn-close" onclick="window.close()">Close This Tab</button>
    </div>
  </div>
  <script>
    // UPDATE THIS to your latest Apps Script deployment URL
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5uelWoB54fXlzEnWIOXiv5KoijhXq12xiapz_TZmyxJnBdnWNv6De5RBwpPLp6Z0_UA/exec";

    var params = new URLSearchParams(window.location.search);
    var qs = window.location.search;  // includes leading "?", forwards ?t=... or any other params verbatim

    function handleResponse(data) {
      console.log("JSONP response received:", JSON.stringify(data));
      showResult(data.success, data.title, data.message);
    }

    var script = document.createElement('script');
    script.src = APPS_SCRIPT_URL + qs;
    console.log("JSONP request URL:", script.src);
    script.onload = function() { console.log("Script tag loaded"); };
    script.onerror = function(e) {
      console.log("Script tag onerror fired", e);
      showResult(false, "Error", "Something went wrong. Please try again or contact support.");
    };
    document.body.appendChild(script);

    function showResult(success, title, message) {
      var card = document.getElementById("card");
      card.classList.remove("loading");
      var isInfo = (!success && title === "Already Confirmed");
      card.classList.add(success ? "success" : (isInfo ? "info" : "fail"));
      document.getElementById("icon").innerHTML = success ? "\u2714" : (isInfo ? "\u2139" : "\u2718");
      document.getElementById("title").textContent = title;
      document.getElementById("message").innerHTML = message;
      document.title = title;
    }
  </script>
</body>
</html>
